name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一个 PR 取消上一次还没跑完的,省资源
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- 单元测试 + 类型检查(Linux,快)----
  lint-and-test:
    name: Lint & Test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (node + web)
        run: npm run typecheck

      - name: Vitest
        run: npm test

  # ---- Windows 打包烟测(只在 main 分支跑,PR 太贵)----
  package-windows:
    name: Package Windows (windows-latest)
    runs-on: windows-latest
    # 默认只在 main 上跑,PR 跳过(省 Windows runner 配额,本地有需要再手动跑)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 国内镜像绕开 Electron / electron-builder 拉资源时的 TLS 抖动
      # 西方 IP 直接用默认值即可,有需要可加 env override
      - name: Install dependencies
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
        run: npm ci

      - name: Build
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
        run: npm run build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-updater-windows-installer
          path: release/*.exe
          if-no-files-found: error
          retention-days: 14
